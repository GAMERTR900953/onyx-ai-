<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ONYX AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #ekran { width: 100%; max-width: 500px; height: 400px; border: 1px solid #333; overflow-y: scroll; padding: 15px; margin-bottom: 10px; background: #111; border-radius: 10px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #222; color: #fff; }
        button { padding: 10px 20px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>ONYX AI</h1>
    <div id="ekran"></div>
    <div>
        <input type="text" id="yazi" placeholder="Emrini ver patron...">
        <button onclick="sor()">Gönder</button>
    </div>
    <script>
        async function sor() {
            let giris = document.getElementById('yazi').value;
            let ekran = document.getElementById('ekran');
            if(!giris) return;
            ekran.innerHTML += `<p><b>Sen:</b> ${giris}</p>`;
            document.getElementById('yazi').value = "";
            let res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: giris })
            });
            let data = await res.json();
            ekran.innerHTML += `<p><b>ONYX:</b> ${data.text}</p>`;
        }
    </script>
</body>
</html>
